<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Admin - rmnzz store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style> body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; } </style>
</head>
<body class="text-gray-800">

    <!-- Navbar -->
    <nav class="bg-gray-900 text-white shadow-md sticky top-0 z-30">
        <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center gap-2 font-extrabold text-xl tracking-tight">
                    <i class="fas fa-lock text-red-400"></i> Admin<span class="text-gray-400">Panel</span>
                </div>
                <div class="flex space-x-4">
                    <a href="index.html" class="text-gray-300 border-b-2 border-transparent hover:text-white px-3 py-2 font-semibold transition-all">Kunjungi Toko</a>
                    <a href="admin.html" class="text-white border-b-2 border-red-400 px-3 py-2 font-semibold transition-all">Dashboard</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Halaman Admin Panel -->
    <main class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <h2 class="text-2xl font-bold text-gray-900 mb-6 border-b border-gray-300 pb-2">Kelola Toko</h2>

        <!-- Pengaturan Web -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 mb-8">
            <h3 class="text-lg font-bold text-gray-800 mb-4"><i class="fas fa-cog text-blue-500 mr-2"></i> Pengaturan Website Utama</h3>
            <form id="settingsForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Teks Pengumuman (Banner Atas)</label>
                    <input type="text" id="announceInput" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500 text-sm" placeholder="Kosongkan jika tidak ingin ada pengumuman">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Nomor WA Admin (Untuk Tombol Chat Mengambang)</label>
                    <input type="number" id="globalWaInput" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500 text-sm" placeholder="Contoh: 6281234567890">
                </div>
                <button type="submit" class="bg-gray-800 text-white px-4 py-2 rounded-lg text-sm font-bold hover:bg-gray-900 transition-all">Simpan Pengaturan</button>
            </form>
        </div>

        <!-- Form Tambah Akun -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
            <h3 class="text-lg font-bold text-gray-800 mb-4"><i class="fas fa-plus-circle text-green-500 mr-2"></i> Tambah Postingan Akun Baru</h3>
            <form id="addAccountForm" class="space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">Kategori Game</label>
                        <select id="gameInput" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-blue-500 text-sm" required>
                            <option value="Mobile Legends">Mobile Legends</option>
                            <option value="Valorant">Valorant</option>
                            <option value="Free Fire">Free Fire</option>
                            <option value="Genshin Impact">Genshin Impact</option>
                            <option value="Bloodstrike">Bloodstrike</option>
                            <option value="Roblox">Roblox</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">Harga (Rp)</label>
                        <input type="number" id="priceInput" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-blue-500 text-sm" placeholder="Contoh: 150000" required>
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Judul Postingan</label>
                    <input type="text" id="titleInput" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-blue-500 text-sm" placeholder="Contoh: Akun Sultan Mythic Glory" required>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Upload Foto Spek (Bisa Lebih dari 1)</label>
                    <input type="file" id="imageInput" multiple accept="image/*" class="w-full px-4 py-2 border border-gray-300 rounded-lg text-sm bg-gray-50" required>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Spesifikasi Lengkap</label>
                    <textarea id="descInput" rows="4" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-blue-500 text-sm" placeholder="Tuliskan spesifikasi lengkap..." required></textarea>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Nomor WA Pemilik Akun</label>
                    <input type="number" id="ownerWaInput" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-blue-500 text-sm" placeholder="Contoh: 6289876543210" required>
                </div>
                <button type="submit" id="submitBtn" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 transition-all">Posting Akun ke Web</button>
            </form>
        </div>
    </main>

    <script>
        let accounts = JSON.parse(localStorage.getItem('rmnzStoreAccounts')) || [];
        let settings = JSON.parse(localStorage.getItem('rmnzStoreSettings')) || { announcement: "Selamat datang di Rmnzz Store!", globalWa: "6281234567890" };

        // Load pengaturan saat masuk admin
        window.onload = () => {
            document.getElementById('announceInput').value = settings.announcement;
            document.getElementById('globalWaInput').value = settings.globalWa;
        };

        // Form Pengaturan
        document.getElementById('settingsForm').addEventListener('submit', function(e) {
            e.preventDefault();
            settings.announcement = document.getElementById('announceInput').value;
            settings.globalWa = document.getElementById('globalWaInput').value;
            localStorage.setItem('rmnzStoreSettings', JSON.stringify(settings));
            alert("Pengaturan Berhasil Disimpan!");
        });

        // Form Upload Gambar
        const getBase64 = (file) => new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
            reader.onerror = error => reject(error);
        });

        // Form Tambah Akun
        document.getElementById('addAccountForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.innerText = "Memproses Upload...";
            btn.disabled = true;

            try {
                const files = document.getElementById('imageInput').files;
                let base64Images = [];
                for (let i = 0; i < files.length; i++) {
                    base64Images.push(await getBase64(files[i]));
                }

                const newAccount = {
                    id: Date.now(),
                    game: document.getElementById('gameInput').value,
                    title: document.getElementById('titleInput').value,
                    price: parseInt(document.getElementById('priceInput').value),
                    description: document.getElementById('descInput').value,
                    ownerWa: document.getElementById('ownerWaInput').value,
                    images: base64Images
                };

                accounts.push(newAccount);
                localStorage.setItem('rmnzStoreAccounts', JSON.stringify(accounts));

                alert("Akun Berhasil Diposting! Silakan cek di Halaman Utama.");
                this.reset();
            } catch (error) {
                alert("Upload gagal. Ukuran file gambar mungkin terlalu besar.");
            } finally {
                btn.innerText = "Posting Akun ke Web";
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
